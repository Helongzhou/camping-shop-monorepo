name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: 🌐 Build & publish storefront
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: 'true'
      NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
      NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build shared packages
        run: pnpm --filter @myshop/shared run build

      - name: 📄 Static export (Next.js → out/)
        run: pnpm --filter @myshop/web run build:pages

      - name: 🔍 Verify export artifact
        run: |
          test -f apps/web/out/index.html
          test -d apps/web/out/en
          test -f apps/web/out/.nojekyll
          echo "Static export OK — $(find apps/web/out -name 'index.html' | wc -l) HTML files"

      - name: 🚀 Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/out
          force_orphan: true
