name: 🚀 Camping Shop CD (🍉 自动化部署)

on:
  push:
    branches: [ main ] # 只有当代码正式合并到 main 主分支时才触发部署

jobs:
  deploy-frontend:
    name: 🎨 部署 Next.js 15 前端 (Vercel)
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ 拉取代码
        uses: actions/checkout@v4
        
      - name: ⚡ 托管发布至 Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID}}
          vercel-project-id: ${{ secrets.PROJECT_ID}}
          vercel-args: '--prod' # 生产发布
          working-directory: ./apps/web

  deploy-backend:
    name: ⚙️ 部署 NestJS 后端 (以通用 Docker 镜像推送为例)
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ 拉取代码
        uses: actions/checkout@v4

      - name: 🔑 登录到 Docker Hub (或阿里云/AWS镜像仓库)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🐳 编译并推送后端 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile # 需在后端目录下配置 Dockerfile
          push: true
          tags: your-registry/camping-api:latest

      - name: 🔄 触发服务器拉新镜像重启
        run: |
          echo "在此处通过 SSH 密匙或 Webhook 通知你的服务器/Railway 重新拉取镜像并部署"